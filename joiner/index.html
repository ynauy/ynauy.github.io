<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord API Study Tool</title>
    <style>
        :root {
            --blurple: #5865F2;
            --background: #36393f;
            --card-bg: #2f3136;
            --input-bg: #202225;
            --text-main: #ffffff;
            --text-muted: #b9bbbe;
            --danger: #ed4245;
            --success: #3ba55c;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 90%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        h2 { text-align: center; margin-bottom: 20px; font-size: 20px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: bold;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* UI修正: Token入力欄のスタイル */
        textarea, input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 4px;
            border: 1px solid #202225;
            background: var(--input-bg);
            color: white;
            box-sizing: border-box;
            font-family: monospace;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .primary-btn {
            width: 100%;
            padding: 14px;
            background: var(--blurple);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .primary-btn:hover { background: #4752c4; }
        .primary-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .console-box {
            margin-top: 25px;
            background: #000;
            color: #00ff00;
            padding: 15px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            min-height: 150px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            border: 1px solid #444;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="app-container">
    <h2>API Joiner Study</h2>
    
    <label>User Tokens (改行区切り)</label>
    <textarea id="tokens" placeholder="mfa.xxxxx...&#10;mfa.yyyyy..."></textarea>

    <label>Invite Code (Vanity)</label>
    <input type="text" id="inviteCode" placeholder="例: discord-developers">

    <button id="execBtn" class="primary-btn">一括リクエスト実行</button>

    <div class="console-box" id="log">Ready...</div>

    <div class="footer">学習目的以外の使用は控えてください。</div>
</div>

<script>
    const execBtn = document.getElementById('execBtn');
    const logArea = document.getElementById('log');

    execBtn.addEventListener('click', async () => {
        const tokenInput = document.getElementById('tokens').value;
        const code = document.getElementById('inviteCode').value;

        // トークンを配列化
        const tokens = tokenInput.split(/\r?\n/).map(t => t.trim()).filter(t => t !== "");

        if (tokens.length === 0 || !code) {
            alert("トークンと招待コードを入力してください。");
            return;
        }

        execBtn.disabled = true;
        logArea.innerText = `>> 処理開始: ${tokens.length}件\n`;

        for (let i = 0; i < tokens.length; i++) {
            const token = tokens[i];
            logArea.innerText += `\n[${i+1}/${tokens.length}] Sending...`;

            try {
                // Discord API (V10)
                const url = `https://discord.com/api/v10/invites/${code}`;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Authorization': token,
                        'Content-Type': 'application/json'
                    },
                    // 重要: 空のJSONオブジェクトを送ることで「無効なJSON」エラーを回避
                    body: JSON.stringify({})
                });

                const data = await response.json();

                if (response.ok) {
                    logArea.innerText += `\n>> SUCCESS: サーバーに参加しました。`;
                } else {
                    logArea.innerText += `\n>> ERROR ${response.status}: ${data.message}`;
                }
            } catch (err) {
                logArea.innerText += `\n>> FETCH ERROR: ブラウザの制限(CORS)により遮断されました。`;
            }

            // 連続送信による負荷軽減のための待機
            await new Promise(r => setTimeout(r, 1000));
        }

        logArea.innerText += `\n\n>> 全ての処理が完了しました。`;
        execBtn.disabled = false;
    });
</script>

</body>
</html>
