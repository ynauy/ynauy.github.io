<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord API Study Tool</title>
    <style>
        :root {
            --blurple: #5865F2;
            --background: #36393f;
            --card-bg: #2f3136;
            --input-bg: #202225;
            --text-main: #ffffff;
            --text-muted: #b9bbbe;
            --danger: #ed4245;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .app-container {
            width: 90%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: bold;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        textarea, input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: var(--input-bg);
            border: 1px solid transparent;
            border-radius: 4px;
            color: white;
            box-sizing: border-box;
            font-family: monospace;
        }

        textarea { min-height: 120px; resize: vertical; }

        .primary-btn {
            width: 100%;
            padding: 14px;
            background: var(--blurple);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        .console-box {
            margin-top: 25px;
            background: #000;
            color: #00ff00;
            padding: 15px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            min-height: 150px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            border: 1px solid #444;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h2>API Joiner Study</h2>
    
    <label>User Tokens (Line by Line)</label>
    <textarea id="tokens" placeholder="mfa.xxxxx...&#10;mfa.yyyyy..."></textarea>

    <label>Invite Code</label>
    <input type="text" id="inviteCode" placeholder="example-vanity">

    <button id="execBtn" class="primary-btn">一括実行</button>

    <div class="console-box" id="log">Console Ready...</div>
</div>

<script>
    const execBtn = document.getElementById('execBtn');
    const logArea = document.getElementById('log');

    // 400エラー回避のためのダミープロパティ (コンテキストデータ)
    const contextData = btoa(JSON.stringify({
        location: "Join Guild",
        location_guild_id: null,
        location_channel_id: null,
        location_channel_type: null
    }));

    execBtn.addEventListener('click', async () => {
        const tokenInput = document.getElementById('tokens').value;
        const code = document.getElementById('inviteCode').value.split('/').pop(); // URLだった場合コードのみ抽出
        const tokens = tokenInput.split(/\r?\n/).map(t => t.trim()).filter(t => t !== "");

        if (tokens.length === 0 || !code) {
            logArea.innerText = ">> Error: Token or Invite Code is missing.";
            return;
        }

        execBtn.disabled = true;
        logArea.innerText = `>> Starting Task: ${tokens.length} accounts\n`;

        for (let i = 0; i < tokens.length; i++) {
            const token = tokens[i];
            logArea.innerText += `\n[${i+1}/${tokens.length}] Sending Request...`;

            try {
                // ユーザー版エンドポイント (v9またはv10)
                const url = `https://discord.com/api/v10/invites/${code}`;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Authorization': token,
                        'Content-Type': 'application/json',
                        'X-Context-Properties': contextData // アプリ版に近い挙動を模倣
                    },
                    body: JSON.stringify({}) // 必須: 空のオブジェクト
                });

                const data = await response.json();

                if (response.ok) {
                    logArea.innerText += `\n>> SUCCESS: Joined ${data.guild?.name || 'Server'}`;
                } else {
                    logArea.innerText += `\n>> FAILED (${response.status}): ${data.message}`;
                    // 400エラー時の詳細ログ
                    if(response.status === 400) console.log("Payload Error Details:", data);
                }
            } catch (err) {
                logArea.innerText += `\n>> NETWORK ERROR: Check CORS or Connection.`;
            }

            // 安全のためのディレイ
            await new Promise(r => setTimeout(r, 1000));
        }

        logArea.innerText += `\n\n>> Task Completed.`;
        execBtn.disabled = false;
    });
</script>

</body>
</html>
