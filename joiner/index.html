<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord API Study Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M19.27 4.73C17.78 4.05 16.18 3.56 14.5 3.32c-.03.06-.07.12-.1.19-1.9-.28-3.83-.28-5.73 0-.03-.07-.07-.13-.1-.19-1.68.24-3.28.73-4.77 1.41L3.57 5.05c2.58-3.84 6.32-5.05 6.32-5.05.02.03.05.06.07.09 1.34-.18 2.7-.18 4.04 0 .02-.03.05-.06.07-.09 0 0 3.74 1.21 6.32 5.05l-.12.32z"/></svg>
                <h1>API Researcher</h1>
            </div>
            <p class="subtitle">Discord API Structure Learning</p>
        </header>

        <main>
            <section class="input-group">
                <label for="token">User Access Token</label>
                <div class="input-wrapper">
                    <input type="password" id="token" placeholder="mfa.xxxxxxxxxxxxxx...">
                    <span class="hint">トークンはブラウザ内でのみ処理されます。</span>
                </div>

                <label for="inviteCode">Vanity / Invite Code</label>
                <div class="input-wrapper">
                    <input type="text" id="inviteCode" placeholder="例: discord-developers">
                </div>

                <button id="joinBtn" class="primary-btn">
                    <span>リクエストを実行</span>
                    <div class="loader" id="loader"></div>
                </button>
            </section>

            <section class="output-group">
                <div class="output-header">
                    <span>Console Output</span>
                    <button id="clearBtn">Clear</button>
                </div>
                <div id="log" class="console-box">Ready for request...</div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 API Study Project | For Educational Purposes Only</p>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
